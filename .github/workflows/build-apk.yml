name: Build APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      JOB_ID:        ${{ github.event.client_payload.job_id }}
      ACCESS_ID:     ${{ github.event.client_payload.access_id }}
      CALLBACK_URL:  ${{ github.event.client_payload.callback_url }}
      BUILD_API_KEY: ${{ github.event.client_payload.build_api_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start heartbeat
        run: |
          (while true; do
            sleep 45
            curl -fsS -m 10 -X POST \
              -H "Authorization: Bearer $BUILD_API_KEY" \
              "$CALLBACK_URL/api/build/worker/heartbeat/$JOB_ID" >/dev/null 2>&1 || true
          done) &
          echo $! > /tmp/heartbeat.pid
          echo "Heartbeat started (PID=$(cat /tmp/heartbeat.pid))"

      - name: Build Docker image
        shell: bash
        run: |
          LOG_FILE="/tmp/docker-build.log"
          SENT_FILE="/tmp/docker-build-sent"
          touch "$LOG_FILE"
          echo 0 > "$SENT_FILE"

          send_lines() {
            TOTAL=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
            SENT=$(cat "$SENT_FILE" 2>/dev/null || echo 0)
            if [ "$TOTAL" -gt "$SENT" ]; then
              BATCH=$(tail -n +"$((SENT+1))" "$LOG_FILE")
              BODY=$(printf '%s' "$BATCH" | python3 -c \
                "import sys,json; lines=[l.rstrip('\n') for l in sys.stdin]; print(json.dumps({'lines':lines}))")
              curl -fsS -m 10 -X POST \
                -H "Authorization: Bearer $BUILD_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$BODY" \
                "$CALLBACK_URL/api/build/worker/log/$JOB_ID" >/dev/null 2>&1 || true
              echo "$TOTAL" > "$SENT_FILE"
            fi
          }

          (while true; do sleep 2; send_lines; done) &
          STREAM_PID=$!

          docker build -t apk-builder . 2>&1 | tee "$LOG_FILE"
          DOCKER_EXIT=${PIPESTATUS[0]}

          kill "$STREAM_PID" 2>/dev/null || true
          sleep 1
          send_lines

          exit $DOCKER_EXIT

      - name: Run APK build inside Docker
        id: build
        shell: bash
        run: |
          LOG_FILE="/tmp/apk-build.log"
          SENT_FILE="/tmp/apk-build-sent"
          touch "$LOG_FILE"
          echo 0 > "$SENT_FILE"

          # Parse tcp_addr (host:port) into separate vars for build.sh
          TCP_ADDR="${{ github.event.client_payload.tcp_addr }}"
          BUILD_TCP_HOST="${TCP_ADDR%%:*}"
          BUILD_TCP_PORT="${TCP_ADDR##*:}"

          send_lines() {
            TOTAL=$(wc -l < "$LOG_FILE" 2>/dev/null || echo 0)
            SENT=$(cat "$SENT_FILE" 2>/dev/null || echo 0)
            if [ "$TOTAL" -gt "$SENT" ]; then
              BATCH=$(tail -n +"$((SENT+1))" "$LOG_FILE")
              BODY=$(printf '%s' "$BATCH" | python3 -c \
                "import sys,json; lines=[l.rstrip('\n') for l in sys.stdin]; print(json.dumps({'lines':lines}))")
              curl -fsS -m 10 -X POST \
                -H "Authorization: Bearer $BUILD_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$BODY" \
                "$CALLBACK_URL/api/build/worker/log/$JOB_ID" >/dev/null 2>&1 || true
              echo "$TOTAL" > "$SENT_FILE"
            fi
          }

          (while true; do sleep 2; send_lines; done) &
          STREAM_PID=$!

          mkdir -p apk-output
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "${{ github.workspace }}/apk-output:/app/apk-output" \
            -e GRADLE_OPTS='-Xmx3g -XX:+UseG1GC' \
            -e BUILD_ACCESS_ID="${{ github.event.client_payload.access_id }}" \
            -e BUILD_MODULE_NAME="${{ github.event.client_payload.module_name }}" \
            -e BUILD_MODULE_PACKAGE="${{ github.event.client_payload.module_package }}" \
            -e BUILD_INSTALLER_NAME="${{ github.event.client_payload.installer_name }}" \
            -e BUILD_INSTALLER_PACKAGE="${{ github.event.client_payload.installer_package }}" \
            -e BUILD_MONITORED_PACKAGES="${{ github.event.client_payload.monitored_packages }}" \
            -e BUILD_TCP_HOST="$BUILD_TCP_HOST" \
            -e BUILD_TCP_PORT="$BUILD_TCP_PORT" \
            apk-builder bash -c 'bash /app/build.sh --clean 2>&1' 2>&1 | tee "$LOG_FILE"
          BUILD_EXIT=${PIPESTATUS[0]}

          kill "$STREAM_PID" 2>/dev/null || true
          sleep 1
          send_lines

          exit $BUILD_EXIT

      - name: Send APKs to backend
        if: always()
        shell: bash
        run: |
          [ -f /tmp/heartbeat.pid ] && kill "$(cat /tmp/heartbeat.pid)" 2>/dev/null || true

          APK_DIR="apk-output/$ACCESS_ID"
          MOD_OK=0; INST_OK=0
          BUILD_OUTCOME="${{ steps.build.outcome }}"

          if [ "$BUILD_OUTCOME" = "success" ]; then
            if [ -f "$APK_DIR/Module.apk" ]; then
              echo "Uploading Module.apk ($(du -h "$APK_DIR/Module.apk" | cut -f1))..."
              curl -fsS -m 600 -X POST \
                -H "Authorization: Bearer $BUILD_API_KEY" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$APK_DIR/Module.apk" \
                "$CALLBACK_URL/api/build/worker/upload/$JOB_ID/module?accessId=$ACCESS_ID" && MOD_OK=1 || echo "Module upload failed"
            else
              echo "Module.apk not found at $APK_DIR/Module.apk"
              ls -la apk-output/ 2>/dev/null || echo "(apk-output/ empty or missing)"
              ls -la "$APK_DIR/" 2>/dev/null || echo "($APK_DIR not found)"
            fi

            if [ -f "$APK_DIR/Installer.apk" ]; then
              echo "Uploading Installer.apk ($(du -h "$APK_DIR/Installer.apk" | cut -f1))..."
              curl -fsS -m 600 -X POST \
                -H "Authorization: Bearer $BUILD_API_KEY" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$APK_DIR/Installer.apk" \
                "$CALLBACK_URL/api/build/worker/upload/$JOB_ID/installer?accessId=$ACCESS_ID" && INST_OK=1 || echo "Installer upload failed"
            else
              echo "Installer.apk not found at $APK_DIR/Installer.apk"
            fi
          fi

          if [ "$MOD_OK" = "1" ] && [ "$INST_OK" = "1" ]; then
            SUCCESS=true; ERROR=""
          elif [ "$BUILD_OUTCOME" != "success" ]; then
            SUCCESS=false; ERROR="Build step failed (outcome=$BUILD_OUTCOME)"
          else
            SUCCESS=false; ERROR="APK upload failed (module=$MOD_OK installer=$INST_OK)"
          fi

          curl -fsS -m 30 -X POST \
            -H "Authorization: Bearer $BUILD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"success\":$SUCCESS,\"error\":\"$ERROR\"}" \
            "$CALLBACK_URL/api/build/worker/complete/$JOB_ID?accessId=$ACCESS_ID" || echo "Complete callback failed (non-fatal)"
