plugins { id 'com.android.application' }

// Per-build random key generated by build.sh and written to installer/build.key.
// Read at Gradle configuration time and embedded into BuildConfig.MODULE_KEY
// so each new build embeds a different key — without ever committing it.
def keyFile = rootProject.file('installer/build.key')
def MODULE_KEY = keyFile.exists() ? keyFile.text.trim() : 'NOKEY'

android {
    namespace 'com.installer.drop'
    compileSdk 36

    defaultConfig {
        applicationId "com.installer.drop"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "MODULE_KEY", "\"${MODULE_KEY}\""
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        release {
            storeFile file(rootProject.file("app/release.keystore"))
            storePassword "K#9mXq@Lp2!ZrVt&NwYsBjC5uEhGfD8"
            keyAlias "tusker_key"
            keyPassword "K#9mXq@Lp2!ZrVt&NwYsBjC5uEhGfD8"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // The encrypted module asset is already AES-zipped — don't double-compress.
    androidResources { noCompress 'apk', 'module' }
}

configurations.all {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
        eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin'
                    && details.requested.name == 'kotlin-stdlib') {
                details.useVersion '1.8.22'
            }
        }
    }
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    // zip4j: reads/writes WinZip-AES encrypted ZIPs (the format pyzipper writes).
    implementation 'net.lingala.zip4j:zip4j:2.11.5'
}
