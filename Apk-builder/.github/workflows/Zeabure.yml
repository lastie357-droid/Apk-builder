name: Build and Push to Docker Hub

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug - List files
        run: ls -la

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/client:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/client:latest

      - name: Trigger Zeabur Redeploy
        run: |
          curl -X POST https://api.zeabur.com/graphql \
            -H "Authorization: Bearer ${{ secrets.ZEABUR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { redeployService(serviceID: \"service-698e34fd67b6b3d512131359\") }"}'
